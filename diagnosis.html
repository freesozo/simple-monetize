      en: {

        startBtn: '🚀 Start Diagnosis',
        q1: 'What do you want to do?', q1sub: 'Pick your primary goal',
        q1a: '✍️', q1aText: 'Write content', q1aDesc: 'Blog, email, reports',
        q1b: '🎨', q1bText: 'Create images', q1bDesc: 'Illustration, photos, design',
        q1c: '💻', q1cText: 'Write code', q1cDesc: 'Web dev, apps, automation',

        q2a: '🆓', q2aText: 'Free only', q2b: '💰', q2bText: 'Under $10/mo',

        q3a: '🇯🇵', q3aText: 'Required', q3aDesc: 'I mainly use Japanese',
        q3b: '🌏', q3bText: 'Nice to have', q3bDesc: '',

        q4: 'How often will you use it?', q4sub: '',
        q4a: '📅', q4aText: 'Daily', q4b: '📆', q4bText: 'A few times/week', q4c: '🗓️', q4cText: 'Occasionally',
        q5: 'Your tech level?', q5sub: '',
        q5a: '🌱', q5aText: 'Beginner', q5aDesc: 'New to AI tools',
        q5b: '🌿', q5bText: 'Intermediate', q5bDesc: 'Used some before',
        q5c: '🌳', q5cText: 'Advanced', q5cDesc: 'API integrations & automation',
        resultTitle: '🎯 Your Recommended AI Tools',
        rank1: '🥇 #1', rank2: '🥈 #2', rank3: '🥉 #3',
        matchLabel: 'Match',
        reasonLabel: '💡 Why this tool',
        detailLink: 'View Details →',
        retryBtn: 'Try Again',
        shareBtn: 'Share Results',
        copiedMsg: 'URL copied!',
        back: '← Back',
      }
    };

    function t(key) { const lang = I18n.getLang(); return (T[lang] && T[lang][key]) || T.ja[key] || key; }

    // ── Scoring config ──
    const PURPOSE_MAP = {
      writing: ['chatgpt-plus','claude-pro','gemini-advanced','notion-ai','jasper-ai','copy-ai','writesonic','deepl','perplexity-pro'],
      image: ['midjourney','stable-diffusion','canva-ai','runway-ml','gamma'],
      code: ['cursor','github-copilot','claude-pro','chatgpt-plus','bolt-new','dify'],
      video: ['runway-ml','elevenlabs','canva-ai','gamma'],
      research: ['perplexity-pro','claude-pro','chatgpt-plus','gemini-advanced','deepl','notion-ai']
    };
    const PRICE_YEN = {
      'chatgpt-plus':3000,'claude-pro':3000,'midjourney':1500,'cursor':3000,'elevenlabs':750,
      'perplexity-pro':3000,'github-copilot':1500,'deepl':1300,'stable-diffusion':0,'canva-ai':1500,
      'gemini-advanced':2900,'notion-ai':1500,'dify':0,'bolt-new':0,'gamma':0,'runway-ml':0,
      'jasper-ai':5850,'copy-ai':0,'sakura-cloud-gpu':3000,'writesonic':0
    };
    const BEGINNER = new Set(['chatgpt-plus','claude-pro','gemini-advanced','canva-ai','deepl','perplexity-pro','notion-ai','gamma','copy-ai','writesonic']);
    const ADVANCED = new Set(['cursor','github-copilot','dify','stable-diffusion','bolt-new','sakura-cloud-gpu']);

    function scoreProduct(p, ans) {
      let s = 0;
      // Q1: Purpose (0-15)
      if ((PURPOSE_MAP[ans.q1] || []).includes(p.id)) s += 15;
      // Q2: Budget (0-10)
      const hasFree = p.tags?.includes('free');
      const yen = PRICE_YEN[p.id] ?? 9999;
      if (ans.q2 === 'free') s += hasFree ? 10 : (yen === 0 ? 8 : 0);
      else if (ans.q2 === 'low') s += (yen <= 1000 ? 10 : (hasFree ? 8 : (yen <= 2000 ? 6 : 2)));
      else if (ans.q2 === 'mid') s += (yen <= 5000 ? 9 : 3);
      else s += 5;
      // Q3: Japanese (0-10)
      const jp = p.tags?.includes('japanese');
      if (ans.q3 === 'required') s += jp ? 10 : 0;
      else if (ans.q3 === 'nice') s += jp ? 7 : 3;
      else s += 5;
      // Q4: Frequency (0-8)
      if (ans.q4 === 'daily') s += hasFree ? 5 : 8;
      else if (ans.q4 === 'weekly') s += 5;
      else s += hasFree ? 8 : 3;
      // Q5: Tech level (0-10)
      if (ans.q5 === 'beginner') s += BEGINNER.has(p.id) ? 10 : (ADVANCED.has(p.id) ? 2 : 5);
      else if (ans.q5 === 'intermediate') s += 6;
      else s += ADVANCED.has(p.id) ? 10 : (BEGINNER.has(p.id) ? 4 : 6);
      // Base rating
      s += (p.rating || 0) * 2;
      return Math.round(s);
    }

    // ── App state ──
    let products = [];
    let answers = {};
    let step = 0; // 0=intro, 1-5=questions, 6=result
    const $app = document.getElementById('diagApp');

    // ── Data loading ──
    async function loadData() {
      const res = await fetch('data/products.json');
      const data = await res.json();
      products = data.products.filter(p => p.category === 'ai' && p.status === 'active');
    }

    // ── Render ──
    function render() {
      if (step === 0) renderIntro();
      else if (step <= 5) renderQuestion(step);
      else renderResults();
    }

    function renderIntro() {
      $app.innerHTML = `
        <div class="diag-hero">
          <span class="diag-hero-icon">${t('heroIcon')}</span>
          <h1>${t('heroTitle')}</h1>
          <p>${t('heroSub')}</p>
          <button class="diag-start-btn" id="startBtn">${t('startBtn')}</button>
        </div>`;
      document.getElementById('startBtn').addEventListener('click', () => { step = 1; render(); });
    }

    function renderProgress() {
      let html = '<div class="diag-progress">';
      for (let i = 1; i <= 5; i++) {
        const cls = i < step ? 'done' : (i === step ? 'active' : '');
        html += `<div class="diag-step ${cls}">${i < step ? '✓' : i}</div>`;
        if (i < 5) html += '<div class="diag-step-line"></div>';
      }
      return html + '</div>';
    }

    function renderQuestion(n) {
      const questions = [
        null,
        { key: 'q1', options: [
          { value: 'writing', icon: 'q1a', text: 'q1aText', desc: 'q1aDesc' },
          { value: 'image', icon: 'q1b', text: 'q1bText', desc: 'q1bDesc' },
          { value: 'code', icon: 'q1c', text: 'q1cText', desc: 'q1cDesc' },
          { value: 'video', icon: 'q1d', text: 'q1dText', desc: 'q1dDesc' },
          { value: 'research', icon: 'q1e', text: 'q1eText', desc: 'q1eDesc' },
        ]},
        { key: 'q2', options: [
          { value: 'free', icon: 'q2a', text: 'q2aText' },
          { value: 'low', icon: 'q2b', text: 'q2bText' },
          { value: 'mid', icon: 'q2c', text: 'q2cText' },
          { value: 'any', icon: 'q2d', text: 'q2dText' },
        ]},
        { key: 'q3', options: [
          { value: 'required', icon: 'q3a', text: 'q3aText', desc: 'q3aDesc' },
          { value: 'nice', icon: 'q3b', text: 'q3bText', desc: 'q3bDesc' },
          { value: 'ok', icon: 'q3c', text: 'q3cText', desc: 'q3cDesc' },
        ]},
        { key: 'q4', options: [
          { value: 'daily', icon: 'q4a', text: 'q4aText' },
          { value: 'weekly', icon: 'q4b', text: 'q4bText' },
          { value: 'occasional', icon: 'q4c', text: 'q4cText' },
        ]},
        { key: 'q5', options: [
          { value: 'beginner', icon: 'q5a', text: 'q5aText', desc: 'q5aDesc' },
          { value: 'intermediate', icon: 'q5b', text: 'q5bText', desc: 'q5bDesc' },
          { value: 'advanced', icon: 'q5c', text: 'q5cText', desc: 'q5cDesc' },
        ]},
      ];
      const q = questions[n];
      const optHTML = q.options.map(o => `
        <div class="diag-option" data-value="${o.value}">
          <span class="diag-option-icon">${t(o.icon)}</span>
          <span class="diag-option-text">${t(o.text)}</span>
          ${o.desc ? `<span class="diag-option-desc">${t(o.desc)}</span>` : ''}
        </div>`).join('');

      $app.innerHTML = `
        ${renderProgress()}
        <div class="diag-question">
          <h2>Q${n}. ${t(q.key)}</h2>
          ${t(q.key + 'sub') ? `<p class="diag-q-sub">${t(q.key + 'sub')}</p>` : ''}
          <div class="diag-options">${optHTML}</div>
          ${n > 1 ? `<button class="diag-back" id="backBtn">${t('back')}</button>` : ''}
        </div>`;

      $app.querySelectorAll('.diag-option').forEach(el => {
        el.addEventListener('click', () => {
          answers[q.key] = el.dataset.value;
          step++;
          render();
        });
      });
      const backBtn = document.getElementById('backBtn');
      if (backBtn) backBtn.addEventListener('click', () => { step--; render(); });
    }

    function renderResults() {
      const scored = products.map(p => ({ product: p, score: scoreProduct(p, answers) }));
      scored.sort((a, b) => b.score - a.score);
      const top3 = scored.slice(0, 3);
      const maxScore = 58; // theoretical max

      // Update URL
      const ids = top3.map(r => r.product.id).join(',');
      history.replaceState(null, '', 'diagnosis.html?result=' + ids);

      const ranks = [t('rank1'), t('rank2'), t('rank3')];
      const rankCls = ['', ' r2', ' r3'];

      let cardsHTML = top3.map((r, i) => {
        const p = r.product;
        const pct = Math.round((r.score / maxScore) * 100);
        const reason = p.recommendedFor || p.summary || '';
        return `
          <div class="diag-result-card${i === 0 ? ' first' : ''}">
            <span class="diag-rank${rankCls[i]}">${ranks[i]}</span>
            <div class="diag-result-header">
              <span class="diag-result-name">${p.name}</span>
              <span class="diag-result-score">${t('matchLabel')} ${pct}%</span>
            </div>
            <div class="diag-result-price">${p.price || ''}</div>
            <p class="diag-result-desc">${p.summary || ''}</p>
            <div class="diag-result-reason"><strong>${t('reasonLabel')}:</strong> ${reason}</div>
            <a href="tool/${p.id}.html" class="diag-result-link">${t('detailLink')}</a>
          </div>`;
      }).join('');

      $app.innerHTML = `
        <div class="diag-results">
          <h2>${t('resultTitle')}</h2>
          ${cardsHTML}
          <div class="diag-actions">
            <button class="diag-retry-btn" id="retryBtn">${t('retryBtn')}</button>
            <button class="diag-share-btn" id="shareBtn">📋 ${t('shareBtn')}</button>
          </div>
        </div>`;

      document.getElementById('retryBtn').addEventListener('click', () => {
        answers = {}; step = 0;
        history.replaceState(null, '', 'diagnosis.html');
        render();
      });
      document.getElementById('shareBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(window.location.href).then(() => {
          const toast = document.getElementById('diagToast');
          toast.textContent = t('copiedMsg');
          toast.classList.add('show');
          setTimeout(() => toast.classList.remove('show'), 2000);
        });
      });
    }

    // ── URL result restore ──
    function checkURLResult() {
      const params = new URLSearchParams(window.location.search);
      const result = params.get('result');
      if (result && products.length > 0) {
        const ids = result.split(',');
        // Find matching products
        const matched = ids.map(id => products.find(p => p.id === id)).filter(Boolean);
        if (matched.length >= 2) {
          step = 6;
          // Fake answers to show results directly
          answers = { q1: 'writing', q2: 'any', q3: 'nice', q4: 'weekly', q5: 'intermediate' };
          return true;
        }
      }
      return false;
    }

    // ── Theme & Lang ──
    function initTheme() {
      const btn = document.getElementById('themeBtn');
      if (!btn) return;
      const apply = (th) => {
        document.documentElement.dataset.theme = th;
        btn.textContent = th === 'dark' ? '☀️' : '🌙';
      };
      apply(document.documentElement.dataset.theme || 'light');
      btn.addEventListener('click', () => {
        const next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', next);
        apply(next);
      });
    }

    function initLang() {
      const btn = document.getElementById('langBtn');
      if (btn) btn.addEventListener('click', () => { I18n.toggle(); render(); });
      window.addEventListener('langchange', () => {
        render();
        const lb = document.getElementById('langBtn');
        if (lb) lb.textContent = I18n.t('lang');
      });
    }

    function initBackToTop() {
      const btn = document.getElementById('backToTop');
      if (!btn) return;
      window.addEventListener('scroll', () => btn.classList.toggle('visible', window.scrollY > 400));
      btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
    }

    // ── Init ──
    async function init() {
      await loadData();
      initTheme();
      initLang();
      initBackToTop();
      I18n.applyAll();
      if (!checkURLResult()) step = 0;
      render();
    }

    init();
  })();
  </script>
</body>
</html>
