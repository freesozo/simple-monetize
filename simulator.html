    <h1 data-i18n="simTitle">ツール料金シミュレーター</h1>
    <p class="page-subtitle" data-i18n="simSubtitle">月額予算を入力して、最適なツールの組み合わせを見つけよう</p>

    <div class="simulator-form">
      <div class="sim-field">
        <label for="budgetInput" data-i18n="simBudgetLabel">月額予算</label>
        <div class="budget-input-wrap">
          <span class="currency">&yen;</span>
          <input type="number" id="budgetInput" value="3000" min="0" step="100" placeholder="3000">
          <span class="currency-suffix" data-i18n="simBudgetSuffix">円/月</span>
        </div>
        <div class="budget-presets">
          <button class="budget-preset" data-amount="1000">&yen;1,000</button>
          <button class="budget-preset" data-amount="3000">&yen;3,000</button>
          <button class="budget-preset" data-amount="5000">&yen;5,000</button>
          <button class="budget-preset" data-amount="10000">&yen;10,000</button>
        </div>
      </div>

      <div class="sim-field">
        <label data-i18n="simCategoryLabel">必要なツール（複数選択可）</label>
        <div class="sim-categories" id="simCategories">
          <label class="sim-cat-check"><input type="checkbox" value="server" checked> <span data-i18n="simCatServer">レンタルサーバー</span></label>
          <label class="sim-cat-check"><input type="checkbox" value="vpn" checked> <span data-i18n="simCatVPN">VPN</span></label>
          <label class="sim-cat-check"><input type="checkbox" value="ai"> <span data-i18n="simCatAI">AIツール</span></label>
          <label class="sim-cat-check"><input type="checkbox" value="design"> <span data-i18n="simCatDesign">デザインツール</span></label>
          <label class="sim-cat-check"><input type="checkbox" value="learning"> <span data-i18n="simCatLearning">学習サービス</span></label>
        </div>
      </div>

      <div class="sim-field">
        <label data-i18n="simPriorityLabel">重視するポイント</label>
        <div class="sim-priority" id="simPriority">
          <label class="sim-radio"><input type="radio" name="priority" value="cost" checked> <span data-i18n="simPriCost">コスパ重視</span></label>
          <label class="sim-radio"><input type="radio" name="priority" value="performance"> <span data-i18n="simPriPerf">性能重視</span></label>
          <label class="sim-radio"><input type="radio" name="priority" value="balance"> <span data-i18n="simPriBalance">バランス</span></label>
        </div>
      </div>

      <button class="btn-simulate" id="simulateBtn" data-i18n="simStartBtn">シミュレーション開始</button>
    </div>

    <div id="simulatorResults" class="simulator-results" style="display:none">
