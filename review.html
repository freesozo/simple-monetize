        </div>

        <!-- Ad Slot -->
        <div class="ad-slot" data-i18n="adSlot">広告スペース</div>

        <div class="review-content">
          <div class="review-main">
            <div class="review-description" id="reviewDescription"></div>
            <div class="pros-cons">
              <div class="pros">
                <h3 id="prosLabel">メリット</h3>
                <ul id="reviewPros"></ul>
              </div>
              <div class="cons">

          <div class="review-sidebar">

              <p id="ctaSubtext">まずは公式サイトで詳細をチェック</p>

        <div class="ad-slot" data-i18n="adSlot">広告スペース</div>

        <!-- Related Products -->
        <div class="products-section">
          <h2 class="section-title" id="relatedTitle">関連ツール</h2>
          <div class="product-grid" id="relatedGrid"></div>
        </div>
      </div>
