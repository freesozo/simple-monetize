name: Auto Check & Deploy

on:
  push:
    branches: [main]
  schedule:
    # 毎週月曜 9:00 JST (0:00 UTC) に自動チェック
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate Data
        run: |
          echo "=== Validating products.json ==="
          python3 << 'PYEOF'
          import json, sys
          with open('data/products.json', encoding='utf-8') as f:
              data = json.load(f)
          products = data['products']
          print(f'Total products: {len(products)}')
          required = ['id','name','category','summary','rating','price','status']
          errors = 0
          for i, p in enumerate(products):
              for key in required:
                  if key not in p or not p[key]:
                      print(f'ERROR: Product {p.get("name","#"+str(i))} missing: {key}')
                      errors += 1
          ids = [p['id'] for p in products]
          dupes = set(x for x in ids if ids.count(x) > 1)
          if dupes:
              print(f'ERROR: Duplicate IDs: {dupes}')
              errors += 1
          if errors:
              sys.exit(1)
          print('All validations passed!')
          PYEOF

      - name: Check Links
        continue-on-error: true
        run: |
          echo "=== Checking links ==="
          python3 << 'PYEOF'
          import json, urllib.request, ssl, sys
          ctx = ssl.create_default_context()
          ctx.check_hostname = False
          ctx.verify_mode = ssl.CERT_NONE
          with open('data/products.json', encoding='utf-8') as f:
              products = json.load(f)['products']
          fail = 0
          for p in products:
              url = p.get('officialUrl','')
              if not url: continue
              try:
                  req = urllib.request.Request(url, method='HEAD', headers={'User-Agent':'Mozilla/5.0'})
                  resp = urllib.request.urlopen(req, timeout=15, context=ctx)
                  print(f'OK: {p["name"]} ({resp.getcode()})')
              except:
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent':'Mozilla/5.0'})
                      resp = urllib.request.urlopen(req, timeout=15, context=ctx)
                      print(f'OK: {p["name"]} ({resp.getcode()} via GET)')
                  except Exception as e:
                      print(f'FAIL: {p["name"]} - {e}')
                      fail += 1
          if fail:
              print(f'{fail} broken link(s) found')
          PYEOF

      - name: Update timestamps
        run: |
          python3 << 'PYEOF'
          import json, datetime
          today = datetime.date.today().isoformat()
          with open('data/products.json', encoding='utf-8') as f:
              data = json.load(f)
          for p in data['products']:
              p['lastChecked'] = today
          with open('data/products.json', 'w', encoding='utf-8') as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          with open('data/config.json', encoding='utf-8') as f:
              config = json.load(f)
          config['lastUpdated'] = today
          with open('data/config.json', 'w', encoding='utf-8') as f:
              json.dump(config, f, ensure_ascii=False, indent=2)
          print(f'Timestamps updated to {today}')
          PYEOF

      - name: Regenerate blog articles
        run: |
          echo "=== Regenerating blog articles ==="
          python3 generate-blog.py

      - name: Regenerate sitemap (with blog)
        run: |
          python3 << 'PYEOF'
          import json, datetime, glob, os

          BASE = 'https://tools.freesozo.com'
          today = datetime.date.today().isoformat()

          with open('data/products.json', encoding='utf-8') as f:
              data = json.load(f)
          with open('data/config.json', encoding='utf-8') as f:
              config = json.load(f)

          urls = []
          urls.append(('/', 'weekly', '1.0'))
          urls.append(('/privacy.html', 'monthly', '0.3'))
          urls.append(('/go.html', 'monthly', '0.1'))

          for cat in config.get('categories', []):
              urls.append((f'/?cat={cat["id"]}', 'weekly', '0.7'))
          for p in data['products']:
              urls.append((f'/review.html?id={p["id"]}', 'monthly', '0.6'))

          # Blog URLs
          blog_files = sorted(glob.glob('blog/*.html'))
          for bf in blog_files:
              fname = os.path.basename(bf)
              prio = '0.8' if fname == 'index.html' else '0.7'
              urls.append((f'/blog/{fname}', 'weekly', prio))

          xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'
          for loc, freq, prio in urls:
              xml += f'  <url><loc>{BASE}{loc}</loc><changefreq>{freq}</changefreq><priority>{prio}</priority></url>\n'
          xml += '</urlset>\n'

          with open('sitemap.xml', 'w', encoding='utf-8') as f:
              f.write(xml)
          print(f'sitemap.xml: {len(urls)} URLs')
          PYEOF

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "auto: weekly update $(date '+%Y-%m-%d')"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
