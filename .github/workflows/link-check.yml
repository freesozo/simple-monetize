name: Weekly Link Check

on:
  schedule:
    - cron: '0 3 * * 1'  # Every Monday at 03:00 UTC (12:00 JST)
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run link checker
        id: check
        continue-on-error: true
        run: python scripts/check-links.py

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: link-check-results
          path: broken_links.json
          retention-days: 30

      - name: Create issue if broken links found
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Broken Links Detected\n\n';
            body += 'The weekly link checker found broken links.\n\n';

            try {
              const data = JSON.parse(fs.readFileSync('broken_links.json', 'utf8'));
              body += `**Checked:** ${data.total_checked} products\n`;
              body += `**Broken:** ${data.total_broken} links\n`;
              body += `**Date:** ${data.checked_at}\n\n`;
              body += '| Tool | URL | Error |\n|------|-----|-------|\n';
              for (const link of data.broken_links) {
                body += `| ${link.name} | ${link.url} | ${link.error} |\n`;
              }
            } catch (e) {
              body += 'Could not parse broken_links.json: ' + e.message;
            }

            body += '\n\n---\n*Auto-generated by link-check workflow*';

            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔗 Broken links detected (${today})`,
              body: body,
              labels: ['broken-link', 'automated']
            });
